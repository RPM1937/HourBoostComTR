<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Sıfırla — HourBoost</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Outfit,sans-serif;background:#0d0e12;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:#13151b;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.logo{font-size:0.85rem;font-weight:700;letter-spacing:1px;color:#5a6070;margin-bottom:24px;text-align:center;}
.logo span{color:#00e5a0;}
.icon{font-size:40px;text-align:center;margin-bottom:16px;}
.title{font-size:1.3rem;font-weight:700;color:#e8eaf0;margin-bottom:8px;text-align:center;}
.subtitle{font-size:0.85rem;color:#8892a0;margin-bottom:28px;text-align:center;line-height:1.6;}
label{display:block;font-size:0.73rem;font-weight:600;color:#8892a0;margin-bottom:5px;margin-top:16px;}
.input-wrap{position:relative;}
input[type=password]{width:100%;padding:11px 15px;background:#1a1d26;border:1px solid rgba(255,255,255,0.07);border-radius:10px;color:#e8eaf0;font-family:Outfit,sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
input[type=password]:focus{border-color:rgba(0,229,160,0.4);box-shadow:0 0 0 3px rgba(0,229,160,0.08);}
.toggle-pass{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#5a6070;cursor:pointer;font-size:0.72rem;font-family:Outfit,sans-serif;font-weight:500;padding:2px 6px;}
.toggle-pass:hover{color:#e8eaf0;}
.btn{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;font-family:Outfit,sans-serif;font-size:0.9rem;font-weight:700;margin-top:20px;background:linear-gradient(135deg,#00c98b,#00a572);color:#001a0f;transition:all 0.2s;}
.btn:hover{box-shadow:0 4px 20px rgba(0,229,160,0.3);transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.msg{padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-top:16px;font-weight:500;display:none;}
.msg.ok{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:#00e5a0;display:block;}
.msg.er{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.2);color:#ff4d6d;display:block;}
.error-card{text-align:center;}
.error-icon{font-size:48px;margin-bottom:16px;}
.error-title{font-size:1.2rem;font-weight:700;color:#ff4d6d;margin-bottom:12px;}
.error-msg{font-size:0.88rem;color:#8892a0;margin-bottom:24px;line-height:1.6;}
.back-btn{display:inline-block;padding:10px 24px;background:rgba(255,77,109,0.1);color:#ff4d6d;border:1px solid rgba(255,77,109,0.2);border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">HOUR<span>BOOST</span></div>

  {% if valid %}
  <div class="icon">🔑</div>
  <div class="title">Yeni Şifre Belirle</div>
  <div class="subtitle">Hesabın için yeni bir şifre oluştur.</div>

  <div class="msg" id="msg"></div>

  <label>Yeni Şifre</label>
  <div class="input-wrap">
    <input type="password" id="pass1" placeholder="En az 6 karakter">
    <button class="toggle-pass" type="button" onclick="toggleVis('pass1',this)">Göster</button>
  </div>

  <label>Yeni Şifre Tekrar</label>
  <div class="input-wrap">
    <input type="password" id="pass2" placeholder="Şifreyi tekrar gir">
    <button class="toggle-pass" type="button" onclick="toggleVis('pass2',this)">Göster</button>
  </div>

  <button class="btn" id="btn" onclick="doReset()">ŞİFREYİ GÜNCELLE</button>

  <script>
  var TOKEN = "{{ token }}";

  function toggleVis(id, btn){
    var el = document.getElementById(id);
    if(el.type==='password'){el.type='text';btn.textContent='Gizle';}
    else{el.type='password';btn.textContent='Göster';}
  }

  function doReset(){
    var p1 = document.getElementById('pass1').value;
    var p2 = document.getElementById('pass2').value;
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btn');

    msg.className = 'msg';

    if(!p1 || !p2){
      msg.textContent = 'Lütfen tüm alanları doldurun.';
      msg.className = 'msg er';
      return;
    }
    if(p1.length < 6){
      msg.textContent = 'Şifre en az 6 karakter olmalı.';
      msg.className = 'msg er';
      return;
    }
    if(p1 !== p2){
      msg.textContent = 'Şifreler eşleşmiyor.';
      msg.className = 'msg er';
      return;
    }

    btn.textContent = 'GÜNCELLENİYOR...';
    btn.disabled = true;

    fetch('/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
      body: JSON.stringify({token: TOKEN, password: p1})
    })
    .then(function(r){return r.json();})
    .then(function(r){
      if(r.ok){
        msg.textContent = r.message + ' Giriş sayfasına yönlendiriliyorsunuz...';
        msg.className = 'msg ok';
        setTimeout(function(){window.location.href='/';}, 2500);
      } else {
        msg.textContent = r.error || 'Bir hata oluştu.';
        msg.className = 'msg er';
        btn.textContent = 'ŞİFREYİ GÜNCELLE';
        btn.disabled = false;
      }
    });
  }
  </script>

  {% else %}
  <div class="error-card">
    <div class="error-icon">❌</div>
    <div class="error-title">Geçersiz Link</div>
    <div class="error-msg">{{ message }}</div>
    <a href="/" class="back-btn">Ana Sayfaya Dön</a>
  </div>
  {% endif %}

</div>
</body>
</html>
