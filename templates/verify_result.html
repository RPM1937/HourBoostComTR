<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-posta Doğrulama — HourBoost</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Outfit,sans-serif;background:#0d0e12;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:#13151b;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:48px 40px;max-width:440px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.icon{font-size:52px;margin-bottom:20px;}
.title{font-size:1.4rem;font-weight:700;margin-bottom:12px;}
.title.success{color:#00e5a0;}
.title.error{color:#ff4d6d;}
.message{font-size:0.9rem;color:#8892a0;line-height:1.7;margin-bottom:28px;}
.btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#00c98b,#00a572);color:#001a0f;font-weight:700;font-size:0.9rem;text-decoration:none;border-radius:10px;transition:all 0.2s;}
.btn:hover{box-shadow:0 4px 20px rgba(0,229,160,0.3);transform:translateY(-1px);}
.btn.error-btn{background:rgba(255,77,109,0.1);color:#ff4d6d;border:1px solid rgba(255,77,109,0.2);}
.logo{font-size:0.85rem;font-weight:700;letter-spacing:1px;color:#5a6070;margin-bottom:28px;}
.logo span{color:#00e5a0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">HOUR<span>BOOST</span></div>

  {% if success %}
    <div class="icon">✅</div>
    <div class="title success">Doğrulama Başarılı!</div>
    <div class="message">{{ message }}</div>
    <a href="/" class="btn">⚡ Dashboard'a Git</a>
  {% else %}
    <div class="icon">❌</div>
    <div class="title error">Doğrulama Başarısız</div>
    <div class="message">{{ message }}</div>
    <a href="/" class="btn error-btn">Ana Sayfaya Dön</a>
  {% endif %}
</div>
</body>
</html>
